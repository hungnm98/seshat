services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: seshat
      POSTGRES_PASSWORD: seshat
      POSTGRES_DB: seshat
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: seshat
      MINIO_ROOT_PASSWORD: seshat123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
